backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: ko

collections:
  - name: events
    label: AI 학회 일정
    label_singular: 일정
    folder: content/events
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: 학회명
        name: title
        widget: string
        hint: "캘린더에 표시될 이름"

      - label: 시작일
        name: start_date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: 종료일
        name: end_date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        hint: "하루짜리 행사는 비워두세요"

      - label: 장소
        name: location
        widget: string
        required: false
        hint: "예: 서울 코엑스, 온라인"

      - label: 주최기관
        name: organizer
        widget: string
        required: false

      - label: 분류
        name: category
        widget: select
        options:
          - label: 컨퍼런스
            value: Conference
          - label: 워크샵
            value: Workshop
          - label: 세미나
            value: Seminar
          - label: 심포지엄
            value: Symposium
          - label: 기타
            value: Other
        default: Conference

      - label: 기타 정보
        name: description
        widget: text
        required: false
        hint: "논문 제출 마감일, 주요 주제, 참가비 등"

      - label: 공식 사이트 링크
        name: url
        widget: string
        required: false
        hint: "https://로 시작하는 전체 URL"

      - label: 표시 색상
        name: color
        widget: select
        options:
          - label: "파랑 (기본)"
            value: "#3B82F6"
          - label: "보라"
            value: "#8B5CF6"
          - label: "초록"
            value: "#10B981"
          - label: "빨강"
            value: "#EF4444"
          - label: "주황"
            value: "#F59E0B"
          - label: "하늘"
            value: "#06B6D4"
        default: "#3B82F6"
